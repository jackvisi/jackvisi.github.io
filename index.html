<title> L'UOVO</title>
	<h1>
		Premi sull'uovo per schiuderlo!
	</h1>
<body>
	<img id="uovo" src="egg1.jpg" onclick="schiudiuovo()"></img>
	<h2 id="tom"></h2>
<script>
	let c = 0;

	function schiudiuovo(){
		c++;
		 if (c === 1) {
                document.getElementById("uovo").src = "egg2.jpg";
            }
        if (c === 2) {
                document.getElementById("uovo").src = "egg3.jpg";
            }
        if (c === 3) {
                document.getElementById("uovo").src = "egg4.jpg";
            } 
        if (c === 4) {
                document.getElementById("uovo").src = "egg2.jpg";
                document.getElementById("tom").innerText = "Tomson!";
            }           

	}
</script>
</body>	
</html>
